name: gnocchi-web
on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/gnocchi-web.yml
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Containerfile
          push: true
          tags: |
            ghcr.io/gkgkgkgk/gnocchi-web:latest
            ghcr.io/gkgkgkgk/gnocchi-web:${{ github.sha }}
